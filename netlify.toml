[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."claude-proxy"]
  timeout = 30

[functions."sentiment-proxy"]
  timeout = 26

[[redirects]]
  from = "/api/claude"
  to   = "/.netlify/functions/claude-proxy"
  status = 200

[[redirects]]
  from = "/api/sentiment"
  to   = "/.netlify/functions/sentiment-proxy"
  status = 200
